---
# Ghost CMS — runs on the homelab behind Traefik
# 1. Copy .env.example to .env and fill in values
# 2. docker compose up -d
# 3. Visit https://cms.YOURDOMAIN.com/ghost to complete setup
# 4. Go to Settings → Integrations → Add custom integration
#    Copy the "Content API Key" — this goes into Cloudflare Pages as GHOST_KEY

services:
  ghost:
    image: ghost:5-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      url:                          ${GHOST_PUBLIC_URL}
      database__client:             mysql
      database__connection__host:   ghost-db
      database__connection__user:   ghost
      database__connection__password: ${DB_PASSWORD}
      database__connection__database: ghost
      mail__transport:              SMTP
      mail__options__host:          ${SMTP_HOST}
      mail__options__port:          ${SMTP_PORT:-587}
      mail__options__auth__user:    ${SMTP_USER}
      mail__options__auth__pass:    ${SMTP_PASS}
      mail__from:                   ${MAIL_FROM}
    volumes:
      - ./ghost-data:/var/lib/ghost/content
    labels:
      - traefik.enable=true
      - traefik.http.routers.ghost.rule=Host(`${GHOST_HOSTNAME}`)
      - traefik.http.routers.ghost.entrypoints=websecure
      - traefik.http.routers.ghost.tls.certresolver=letsencrypt
      - traefik.http.services.ghost.loadbalancer.server.port=2368
    depends_on:
      ghost-db:
        condition: service_healthy
    networks: [ghost-net, traefik]

  ghost-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER:          ghost
      MYSQL_PASSWORD:      ${DB_PASSWORD}
      MYSQL_DATABASE:      ghost
    volumes:
      - ./ghost-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ghost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ghost-net]

networks:
  ghost-net:
  traefik:
    external: true
